name = "abs-shim"
main = "src/index.ts"
compatibility_date = "2026-04-15"
account_id = "a4b6a5d5b72da9f080658c867a189b18"

# Pure-JS only on Worker side — no nodejs_compat shims.

[dev]
# 8788 is wrangler's default but already in use by other local projects on this machine (Abbotsleigh).
# 13380 sits next to ABS's own port 13378 to keep the cluster of related dev servers contiguous.
# Bound to all interfaces so the shim is reachable over Tailscale from other devices.
port = 13380
ip = "0.0.0.0"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "abs-shim-db"
# database_id is filled in by `npm run db:create` (only required for remote deploys)
database_id = "b8f5afec-443c-4e67-bff2-3b8995c16ce6"
migrations_dir = "migrations"

# Persistent cover cache. The cover endpoint probes the m4b's moov atom
# the first time it sees an item; without R2, every CF cache miss reprobes
# upstream (filedn, etc), which is ~50–500ms. With R2, misses are ~10ms.
[[r2_buckets]]
binding = "COVERS"
bucket_name = "abs-shim-covers"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "ListeningSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ListeningSessionDO"]

# Serve the official ABS web client (Nuxt static build extracted from the
# advplyr/audiobookshelf docker image) for any path the Worker doesn't claim.
# The Worker runs first for every request — it falls through to env.ASSETS
# only on `app.notFound` so API routes like POST /login keep working even
# though `/login/index.html` exists in the bundle.
[assets]
directory = "./web"
binding = "ASSETS"
# Run the Worker first so API routes like `POST /login` aren't intercepted by
# the static-asset handler (which would 405 anything that's not GET/HEAD).
run_worker_first = true
# SPA fallback — serve index.html for any non-asset route so reloading on a
# deep route like /audiobookshelf/library/:id renders the client and lets it
# router-match on the client side.
not_found_handling = "single-page-application"
